<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Celes 💐</title><style>
body{
  margin:0;
  background:black;
}
canvas{
  display:block;
  margin:auto;
  background:black;
}
</style></head><body>
<canvas id="c" width="600" height="800"></canvas><script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let pasos = [];

// 🔹 Función para simular turtle (líneas progresivas)
function lineaAnimada(x1,y1,x2,y2,color,grosor=2,delay=0){
  pasos.push(()=>{
    return new Promise(resolve=>{
      let t=0;
      function draw(){
        t+=0.02;
        if(t>1)t=1;

        ctx.strokeStyle=color;
        ctx.lineWidth=grosor;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(
          x1+(x2-x1)*t,
          y1+(y2-y1)*t
        );
        ctx.stroke();

        if(t<1){
          requestAnimationFrame(draw);
        }else{
          resolve();
        }
      }
      setTimeout(draw,delay);
    });
  });
}

// 🔹 círculo animado (para pétalos)
function circuloAnimado(x,y,r,color,delay=0){
  pasos.push(()=>{
    return new Promise(resolve=>{
      let ang=0;
      function draw(){
        ang+=0.1;

        ctx.beginPath();
        ctx.arc(x,y,r,0,ang);
        ctx.fillStyle=color;
        ctx.fill();

        if(ang<Math.PI*2){
          requestAnimationFrame(draw);
        }else{
          resolve();
        }
      }
      setTimeout(draw,delay);
    });
  });
}

// 🌻 Flor tipo girasol
function flor(x,y){
  // pétalos
  for(let i=0;i<8;i++){
    let ang = i*(Math.PI*2/8);
    let px = x + Math.cos(ang)*20;
    let py = y + Math.sin(ang)*20;
    circuloAnimado(px,py,12,"yellow");
  }
  // centro
  circuloAnimado(x,y,12,"saddlebrown");
}

// 🌿 hoja
function hoja(x,y){
  lineaAnimada(x,y,x-30,y-40,"limegreen",3);
  lineaAnimada(x,y,x+30,y-40,"limegreen",3);
}

// 🎀 base ramo
function base(){
  lineaAnimada(300,500,200,650,"lightblue",4);
  lineaAnimada(300,500,400,650,"lightblue",4);
}

// ✍️ texto final
function texto(){
  pasos.push(()=>{
    return new Promise(resolve=>{
      ctx.fillStyle="gold";
      ctx.font="26px Arial";
      ctx.textAlign="center";

      let txt="Te quiero, Celes. Para tu";
      let i=0;

      function escribir(){
        ctx.fillText(txt.substring(0,i),300,750);
        i++;
        if(i<=txt.length){
          setTimeout(escribir,80);
        }else{
          resolve();
        }
      }
      escribir();
    });
  });
}


// --- ORDEN DE DIBUJO (como turtle) ---
base();

flor(300,300);
flor(220,250);
flor(380,250);
flor(260,180);
flor(340,150);

hoja(260,350);
hoja(340,350);

texto();


// ▶️ Ejecutar animación en secuencia
async function ejecutar(){
  for(let paso of pasos){
    await paso();
  }
}

ejecutar();

</script></body>
</html>
