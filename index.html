<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Celes 🌻</title>
    <style>
        body { margin: 0; background-color: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { max-width: 95vw; max-height: 95vh; }
    </style>
</head>
<body>
    <canvas id="flowerCanvas"></canvas>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 800;
        ctx.translate(400, 400); // Centrar el dibujo

        let step = 0;

        function drawFlower(x, y) {
            // Pétalos amarillos
            ctx.fillStyle = "yellow"; ctx.strokeStyle = "orange"; ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.ellipse(x, y, 8, 25, (i * Math.PI) / 6, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
            }
            // Centro café
            ctx.fillStyle = "#5D2906"; ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
        }

        function animate() {
            if (step < 100) {
                // Dibujar envoltura azul poco a poco
                ctx.strokeStyle = "lightblue"; ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(0, 100, step * 1.5, 0, Math.PI, false);
                ctx.stroke();
            } 
            else if (step == 110) drawFlower(150, -50);
            else if (step == 130) drawFlower(60, -120);
            else if (step == 150) drawFlower(-45, -80);
            else if (step == 170) drawFlower(-10, 0);
            else if (step == 190) drawFlower(65, -30);
            else if (step == 210) {
                // Moño rosa
                ctx.fillStyle = "hotpink"; ctx.strokeStyle = "mediumvioletred";
                ctx.beginPath(); ctx.arc(0, 120, 25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            }
            else if (step == 240) {
                // Mensaje final
                ctx.fillStyle = "gold";
                ctx.font = "italic bold 35px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Te quiero, Celes. Para tu", 0, 300);
                return; // Detener animación
            }

            step++;
            requestAnimationFrame(animate);
        }

        // Iniciar animación después de 1 segundo de carga
        setTimeout(() => {
            requestAnimationFrame(animate);
        }, 1000);
    </script>
</body>
</html>
